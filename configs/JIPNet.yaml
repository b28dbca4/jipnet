# train settings
train_cfg:
  # initial config
  lr: 1.0e-3
  end_lr: 1.0e-6
  epochs: 16

  # Memory settings for 2×T4 (16 GB each)
  # Effective batch = batch_size × accum_steps = 32 × 4 = 128  (matches paper)
  batch_size: 32      # physical batch total across all GPUs (16 per GPU for 2×T4)
  accum_steps: 4      # gradient accumulation steps
  use_amp: true       # FP16 forward pass — cuts activation memory ~50%
  cuda_ids: [0, 1]

  # lr iteration
  scheduler_type: CosineAnnealingLR
  optimizer: adamW

  # data augmentation

# traning database
db_cfg:
  train_info_path: ./data/example.npy
  valid_info_path: ./data/example.npy

# save settings
save_cfg:
  save_basedir: ./saved/
  save_title: test # time / test

# model settings
model_cfg:
  model: JIPNet
  input_size: 160
  img_channel: 1
  num_classes: 1
  width: 32
  enc_blk_nums: [2, 2, 2]
  dw_expand: 1
  ffn_expand: 2
  mid_blk_nums: [4]
  mid_blk_strides: [1]
  mid_embed_dims: [264]
  dec_nhead: [6, 12]
  dec_local_num: [8, 4]
  dec_hidden_dim: 384
  dec_global_num: 0

pretrain_cfg:
  encoder_pth: 

# loss settings
loss_cfg:
